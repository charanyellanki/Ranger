name: ranger

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ranger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ranger}
      POSTGRES_DB: ${POSTGRES_DB:-ranger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ranger} -d ${POSTGRES_DB:-ranger}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ranger}:${POSTGRES_PASSWORD:-ranger}@postgres:5432/${POSTGRES_DB:-ranger}
      RANGER_ENCRYPTION_KEY: ${RANGER_ENCRYPTION_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-dev-only}
      MOCK_DEVICE_API_URL: http://mock-device-api:8001
      CHROMA_PERSIST_DIR: /data/chroma
      RUNBOOKS_DIR: /data/runbooks
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - chroma_data:/data/chroma
      - ./data/runbooks:/data/runbooks:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  mock-device-api:
    build:
      context: ./mock-device-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
